apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: easyshop-tls-sync
  namespace: istio-ingress # ✅ CRITICAL: Must be in the same namespace as the Gateway
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-secretsmgr # Your existing SecretStore name
    kind: SecretStore
  target:
    name: easyshop-tls # This matches 'credentialName' in your Gateway
    template:
      type: kubernetes.io/tls # Ensures K8s treats it as a TLS cert
  data:
  - secretKey: tls.crt
    remoteRef:
      key: prod/easyshop/ssl # The name of the secret in AWS
      property: certificate
  - secretKey: tls.key
    remoteRef:
      key: prod/easyshop/ssl
      property: privatekey