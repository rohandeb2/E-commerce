apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: default
spec:
  limits:
    cpu: 200

  template:
    metadata:
      labels:
        workload: general

    spec:
      nodeClassRef:
        name: default

      requirements:
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: ["spot","on-demand"]

        - key: "karpenter.k8s.aws/instance-category"
          operator: In
          values: ["c","m","r"]

        - key: "karpenter.k8s.aws/instance-generation"
          operator: Gt
          values: ["3"]

        - key: "kubernetes.io/arch"
          operator: In
          values: ["amd64"]

        - key: "kubernetes.io/os"
          operator: In
          values: ["linux"]

  disruption:
    consolidationPolicy: WhenUnderutilized
    expireAfter: 720h

---
apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2

  role: "KarpenterNodeRole"

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "easyshop-eks-prod"

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "easyshop-eks-prod"

  tags:
    karpenter.sh/discovery: "easyshop-eks-prod"
    environment: production
    project: easyshop

  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 50Gi
        volumeType: gp3
        encrypted: true

  metadataOptions:
    httpEndpoint: enabled
    httpTokens: required