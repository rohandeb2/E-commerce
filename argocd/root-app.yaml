apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: easyshop-root
  namespace: argocd
  labels:
    app.kubernetes.io/name: easyshop-root
    app.kubernetes.io/part-of: easyshop
    environment: root
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/rohan/easyshop-manifests.git'
    targetRevision: HEAD
    path: argocd/apps
    directory:
      recurse: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true