appName: easyshop-frontend
containerPort: 3000
replicaCount: 1
environment: default

image:
  repository: 123456789012.dkr.ecr.us-east-1.amazonaws.com/easyshop
  tag: v1.0.0
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

serviceAccount:
  create: true
  name: easyshop-sa
  iamRoleArn: ""

ingress:
  enabled: true
  host: localhost
  acmArn: ""
  wafArn: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPU: 70
  targetMemory: 80

externalSecrets:
  enabled: true
  awsSecretName: default-secret
  authSecretName: default-auth

aws:
  region: us-east-1

serviceMonitor:
  enabled: true

  port: http
  path: /api/metrics

  interval: 30s
  scrapeTimeout: 10s

  scheme: http

  additionalLabels:
    release: prometheus-stack

  metricRelabelings: []
  relabelings: []

  tlsConfig: {}
  
  
