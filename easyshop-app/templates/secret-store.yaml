apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ include "easyshop-app.fullname" . }}-aws-store
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.aws.region | default "us-east-1" }}
      auth:
        jwt:
          # This uses the IRSA Service Account we already built!
          serviceAccountRef:
            name: {{ .Values.serviceAccount.name }}