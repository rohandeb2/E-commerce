apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "easyshop-app.fullname" . }}-config
data:
  NODE_ENV: "production"
  DB_NAME: "easyshop_db"
  LOG_LEVEL: {{ .Values.config.logLevel | default "info" | quote }}
  S3_BUCKET_NAME: {{ .Values.config.s3BucketName | quote }}
  NEXTAUTH_URL: "https://{{ .Values.ingress.host }}"
  NEXT_PUBLIC_API_URL: "https://{{ .Values.ingress.host }}/api"