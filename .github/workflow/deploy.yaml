name: "EasyShop Enterprise CI/CD"

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main ]

env:
  APP_NAME: easyshop-frontend
  IMAGE_NAME: easyshop-app
  AWS_REGION: us-east-1

jobs:
  # ----------------------------------------------------------
  # 1️⃣ PARALLEL STAGE: Quality, Security (SAST), & Unit Tests
  # ----------------------------------------------------------
  quality-gate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: [lint, test, sonar] # Parallelizing tasks
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci

      - name: Run Task
        run: |
          if [ "${{ matrix.task }}" == "lint" ]; then npm run lint; fi
          if [ "${{ matrix.task }}" == "test" ]; then npm test -- --coverage; fi
          if [ "${{ matrix.task }}" == "sonar" ]; then 
            # SonarCloud logic here
            echo "Running SonarCloud Scan..."
          fi
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ----------------------------------------------------------
  # 2️⃣ DOCKER STAGE: Build with Caching & Trivy SCA
  # ----------------------------------------------------------
  build-and-scan:
    needs: quality-gate
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.vars.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Set Git SHA
        id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx # Required for advanced caching
        uses: docker/setup-buildx-action@v3

      - name: Build and Push (Local Cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true # Load into local docker daemon for Trivy to see it
          tags: ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha }}
          format: 'table'
          exit-code: 1
          severity: 'CRITICAL,HIGH'

  # ----------------------------------------------------------
  # 3️⃣ PUSH STAGE: ECR Upload
  # ----------------------------------------------------------
  push-to-ecr:
    needs: build-and-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and Push
        run: |
          docker tag ${{ env.IMAGE_NAME }}:${{ needs.build-and-scan.outputs.sha }} ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-scan.outputs.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-scan.outputs.sha }}

  # ----------------------------------------------------------
  # 4️⃣ STAGING STAGE: Deploy + DAST (OWASP ZAP)
  # ----------------------------------------------------------
  deploy-staging:
    needs: [push-to-ecr, build-and-scan]
    runs-on: ubuntu-latest
    steps:
      - name: Update Staging Manifest
        run: |
          # Use values.yaml as requested for separation
          git clone https://${{ secrets.GITOPS_PAT }}@github.com/rohan/easyshop-manifests.git
          cd easyshop-manifests/helm/easyshop-app
          sed -i 's/tag: .*/tag: "${{ needs.build-and-scan.outputs.sha }}"/' values.yaml
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git commit -am "deploy: staging version ${{ needs.build-and-scan.outputs.sha }}"
          git push

      - name: OWASP ZAP DAST Scan
        uses: zaproxy/action-full-scan@v0.6.0
        with:
          target: 'https://staging.rohandevops.co.in' # Scan the live staging URL

  # ----------------------------------------------------------
  # 5️⃣ PRODUCTION STAGE: Manual Approval + Rollback Logic
  # ----------------------------------------------------------
  promote-to-prod:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production # Requires Manual Approval in GitHub Settings
    steps:
      - name: Update Production Manifest
        run: |
          # Use values.yaml for strict separation
          git clone https://${{ secrets.GITOPS_PAT }}@github.com/rohan/easyshop-manifests.git
          cd easyshop-manifests/helm/easyshop-app
          sed -i 's/tag: .*/tag: "${{ needs.build-and-scan.outputs.sha }}"/' values.yaml
          git commit -am "promote: production version ${{ needs.build-and-scan.outputs.sha }}"
          git push

      - name: Verify & Rollback if Failed
        run: |
          aws eks update-kubeconfig --name easyshop-prod --region ${{ env.AWS_REGION }}
          # Check rollout status. If it fails, undo immediately.
          if ! kubectl rollout status deployment/${{ env.APP_NAME }} -n production --timeout=5m; then
            echo "Deployment failed! Rolling back..."
            kubectl rollout undo deployment/${{ env.APP_NAME }} -n production
            exit 1
          fi

  # ----------------------------------------------------------
  # 6️⃣ NOTIFICATIONS: Feedback Loop
  # ----------------------------------------------------------
  notify:
    needs: [quality-gate, build-and-scan, push-to-ecr, deploy-staging, promote-to-prod]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}